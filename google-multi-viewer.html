<!DOCTYPE html>
<html>
<head>
  <title>Google Multi File Viewer</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    #toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 12px;
      box-sizing: border-box;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
      flex-shrink: 0;
    }

    .navButton {
      width: 36px;
      height: 32px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #ffffff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .navButton:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #fileInfo {
      min-width: 120px;
      max-width: 45%;
      text-align: center;
      overflow: hidden;
    }

    #fileCounter {
      font-size: 13px;
      color: #333;
      margin-bottom: 2px;
    }

    #fileName {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #openOriginal {
      font-size: 13px;
      text-decoration: none;
      color: #0066cc;
      white-space: nowrap;
      margin-left: 4px;
      flex-shrink: 0;
    }

    #viewerFrame {
      flex: 1;
      width: 100%;
      border: 0;
    }

    #errorMessage {
      display: none;
      padding: 16px;
      color: #b00020;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <button id="prevButton" class="navButton" type="button">&lt;</button>

    <div id="fileInfo">
      <div id="fileCounter">Attachment 1 of 1</div>
      <div id="fileName">Loading...</div>
    </div>

    <button id="nextButton" class="navButton" type="button">&gt;</button>

    <a id="openOriginal" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
  </div>

  <iframe id="viewerFrame" allow="autoplay"></iframe>

  <div id="errorMessage"></div>

  <script>
    let files = [];
    let currentIndex = 0;

    function getQueryParam(param) {
      const params = new URLSearchParams(window.location.search);
      return params.get(param);
    }

    function showError(message) {
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("viewerFrame").style.display = "none";

      const errorDiv = document.getElementById("errorMessage");
      errorDiv.style.display = "block";
      errorDiv.innerText = message;
    }

    function cleanFileId(id) {
      return String(id || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function cleanFileName(name, index) {
      const cleaned = String(name || "").trim();

      if (cleaned) {
        return cleaned;
      }

      return `Attachment ${index + 1}`;
    }

    function getPreviewUrl(fileId) {
      return `https://drive.google.com/file/d/${fileId}/preview`;
    }

    function getOriginalUrl(fileId) {
      return `https://drive.google.com/file/d/${fileId}/view`;
    }

    function parseFilesParam() {
      const filesParam = getQueryParam("files");

      if (!filesParam) {
        return [];
      }

      try {
        const parsed = JSON.parse(filesParam);

        if (!Array.isArray(parsed)) {
          return [];
        }

        return parsed
          .map((item, index) => ({
            id: cleanFileId(item.id || item.fileId || ""),
            name: cleanFileName(item.name || item.fileName || "", index)
          }))
          .filter(file => file.id);

      } catch (e) {
        return [];
      }
    }

    function parseLegacyIdsParam() {
      const idsParam = getQueryParam("ids");

      if (!idsParam) {
        return [];
      }

      return idsParam
        .split(",")
        .map(cleanFileId)
        .filter(Boolean)
        .map((id, index) => ({
          id: id,
          name: `Attachment ${index + 1}`
        }));
    }

    function updateControls() {
      const file = files[currentIndex];

      document.getElementById("fileCounter").innerText =
        `Attachment ${currentIndex + 1} of ${files.length}`;

      document.getElementById("fileName").innerText =
        file.name || `Attachment ${currentIndex + 1}`;

      document.getElementById("prevButton").disabled = currentIndex === 0;
      document.getElementById("nextButton").disabled = currentIndex === files.length - 1;

      if (files.length <= 1) {
        document.getElementById("prevButton").style.display = "none";
        document.getElementById("nextButton").style.display = "none";
      } else {
        document.getElementById("prevButton").style.display = "inline-block";
        document.getElementById("nextButton").style.display = "inline-block";
      }
    }

    function loadCurrentFile() {
      const file = files[currentIndex];

      if (!file || !file.id) {
        showError("No valid file found.");
        return;
      }

      document.getElementById("viewerFrame").src = getPreviewUrl(file.id);
      document.getElementById("openOriginal").href = getOriginalUrl(file.id);

      updateControls();
    }

    document.getElementById("prevButton").addEventListener("click", function () {
      if (currentIndex > 0) {
        currentIndex--;
        loadCurrentFile();
      }
    });

    document.getElementById("nextButton").addEventListener("click", function () {
      if (currentIndex < files.length - 1) {
        currentIndex++;
        loadCurrentFile();
      }
    });

    files = parseFilesParam();

    if (!files.length) {
      files = parseLegacyIdsParam();
    }

    if (!files.length) {
      showError("No files were passed to the viewer.");
    } else {
      loadCurrentFile();
    }
  </script>
</body>
</html>
