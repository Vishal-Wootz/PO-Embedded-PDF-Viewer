<!DOCTYPE html>
<html>
<head>
  <title>Google Multi File Viewer</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    #toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 12px;
      box-sizing: border-box;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
    }

    .navButton {
      width: 36px;
      height: 32px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #ffffff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .navButton:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #fileCounter {
      min-width: 90px;
      text-align: center;
      font-size: 14px;
      color: #333;
    }

    #openOriginal {
      font-size: 13px;
      text-decoration: none;
      color: #0066cc;
      white-space: nowrap;
      margin-left: 8px;
    }

    #viewerFrame {
      flex: 1;
      width: 100%;
      border: 0;
    }

    #errorMessage {
      display: none;
      padding: 16px;
      color: #b00020;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <button id="prevButton" class="navButton" type="button">&lt;</button>
    <div id="fileCounter">Quote 1 of 1</div>
    <button id="nextButton" class="navButton" type="button">&gt;</button>
    <a id="openOriginal" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
  </div>

  <iframe id="viewerFrame" allow="autoplay"></iframe>

  <div id="errorMessage"></div>

  <script>
    let ids = [];
    let currentIndex = 0;

    function getQueryParam(param) {
      const params = new URLSearchParams(window.location.search);
      return params.get(param);
    }

    function showError(message) {
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("viewerFrame").style.display = "none";

      const errorDiv = document.getElementById("errorMessage");
      errorDiv.style.display = "block";
      errorDiv.innerText = message;
    }

    function cleanFileId(id) {
      return String(id || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function getPreviewUrl(fileId) {
      return `https://drive.google.com/file/d/${fileId}/preview`;
    }

    function getOriginalUrl(fileId) {
      return `https://drive.google.com/file/d/${fileId}/view`;
    }

    function updateControls() {
      document.getElementById("fileCounter").innerText =
        `Quote ${currentIndex + 1} of ${ids.length}`;

      document.getElementById("prevButton").disabled = currentIndex === 0;
      document.getElementById("nextButton").disabled = currentIndex === ids.length - 1;

      if (ids.length <= 1) {
        document.getElementById("prevButton").style.display = "none";
        document.getElementById("nextButton").style.display = "none";
      }
    }

    function loadCurrentFile() {
      const fileId = ids[currentIndex];

      document.getElementById("viewerFrame").src = getPreviewUrl(fileId);
      document.getElementById("openOriginal").href = getOriginalUrl(fileId);

      updateControls();
    }

    document.getElementById("prevButton").addEventListener("click", function () {
      if (currentIndex > 0) {
        currentIndex--;
        loadCurrentFile();
      }
    });

    document.getElementById("nextButton").addEventListener("click", function () {
      if (currentIndex < ids.length - 1) {
        currentIndex++;
        loadCurrentFile();
      }
    });

    const idsParam = getQueryParam("ids");

    if (!idsParam) {
      showError("No Google file IDs were passed.");
    } else {
      ids = idsParam
        .split(",")
        .map(cleanFileId)
        .filter(Boolean)
        .reverse();
    
      if (!ids.length) {
        showError("No valid Google file IDs found.");
      } else {
        loadCurrentFile();
      }
    }
  </script>
</body>
</html>
