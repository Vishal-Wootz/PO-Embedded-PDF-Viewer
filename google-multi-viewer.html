<!DOCTYPE html>
<html>
<head>
  <title>Google Multi File Viewer</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    #toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 12px;
      box-sizing: border-box;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
    }

    .navButton {
      width: 36px;
      height: 32px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #ffffff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .navButton:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #fileCounter {
      min-width: 90px;
      text-align: center;
      font-size: 14px;
      color: #333;
    }

    #fileName {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: #555;
    }

    #openOriginal {
      font-size: 13px;
      text-decoration: none;
      color: #0066cc;
      white-space: nowrap;
      margin-left: 8px;
    }

    #viewerFrame {
      flex: 1;
      width: 100%;
      border: 0;
    }

    #errorMessage {
      display: none;
      padding: 16px;
      color: #b00020;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <button id="prevButton" class="navButton" type="button">&lt;</button>
    <div id="fileCounter">File 1 of 1</div>
    <button id="nextButton" class="navButton" type="button">&gt;</button>
    <div id="fileName"></div>
    <a id="openOriginal" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
  </div>

  <iframe id="viewerFrame" allow="autoplay"></iframe>

  <div id="errorMessage"></div>

  <script>
    let files = [];
    let currentIndex = 0;

    function getQueryParam(param) {
      const params = new URLSearchParams(window.location.search);
      return params.get(param);
    }

    function showError(message) {
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("viewerFrame").style.display = "none";

      const errorDiv = document.getElementById("errorMessage");
      errorDiv.style.display = "block";
      errorDiv.innerText = message;
    }

    function cleanFileId(id) {
      return String(id || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function cleanFileName(name, index) {
      const fallback = `File ${index + 1}`;
      return String(name || fallback)
        .trim()
        .replace(/[<>]/g, "");
    }

    function getExtension(fileName) {
      const cleanName = String(fileName || "").toLowerCase().trim();
      const lastDotIndex = cleanName.lastIndexOf(".");

      if (lastDotIndex === -1) return "";

      return cleanName.substring(lastDotIndex + 1);
    }

    function getFileType(fileName) {
      const extension = getExtension(fileName);

      if (extension === "pdf") {
        return "pdf";
      }

      if (["png", "jpg", "jpeg", "webp", "gif"].includes(extension)) {
        return "image";
      }

      return "other";
    }

    function getSortRank(fileType) {
      if (fileType === "pdf") return 1;
      if (fileType === "image") return 2;
      return 99;
    }

    function getPreviewUrl(fileId) {
      return `https://drive.google.com/file/d/${fileId}/preview`;
    }

    function getOriginalUrl(fileId) {
      return `https://drive.google.com/file/d/${fileId}/view`;
    }

    function updateControls() {
      const file = files[currentIndex];

      document.getElementById("fileCounter").innerText =
        `File ${currentIndex + 1} of ${files.length}`;

      document.getElementById("fileName").innerText =
        file.name || `File ${currentIndex + 1}`;

      document.getElementById("prevButton").disabled = currentIndex === 0;
      document.getElementById("nextButton").disabled = currentIndex === files.length - 1;

      if (files.length <= 1) {
        document.getElementById("prevButton").style.display = "none";
        document.getElementById("nextButton").style.display = "none";
      }
    }

    function loadCurrentFile() {
      const file = files[currentIndex];

      document.getElementById("viewerFrame").src = getPreviewUrl(file.id);
      document.getElementById("openOriginal").href = getOriginalUrl(file.id);

      updateControls();
    }

    document.getElementById("prevButton").addEventListener("click", function () {
      if (currentIndex > 0) {
        currentIndex--;
        loadCurrentFile();
      }
    });

    document.getElementById("nextButton").addEventListener("click", function () {
      if (currentIndex < files.length - 1) {
        currentIndex++;
        loadCurrentFile();
      }
    });

    const idsParam = getQueryParam("ids");
    const namesParam = getQueryParam("names");

    if (!idsParam) {
      showError("No Google file IDs were passed.");
    } else {
      const ids = idsParam
        .split(",")
        .map(cleanFileId);

      const names = namesParam
        ? namesParam.split(",").map((name, index) => cleanFileName(name, index))
        : [];

      files = ids
        .map((id, index) => {
          const name = names[index] || `File ${index + 1}`;
          const fileType = getFileType(name);

          return {
            id: id,
            name: name,
            fileType: fileType,
            originalIndex: index
          };
        })
        .filter(file => {
          return file.id && ["pdf", "image"].includes(file.fileType);
        })
        .sort((a, b) => {
          const rankDifference = getSortRank(a.fileType) - getSortRank(b.fileType);

          if (rankDifference !== 0) {
            return rankDifference;
          }

          return a.originalIndex - b.originalIndex;
        });

      if (!files.length) {
        showError("No PDF or image files found.");
      } else {
        loadCurrentFile();
      }
    }
  </script>
</body>
</html>
