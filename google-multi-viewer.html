<!DOCTYPE html>
<html lang="en">
<head>
  <title>Google Multi File Viewer</title>

  <meta charset="utf-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    #toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 12px;
      box-sizing: border-box;
      border-bottom: 1px solid #dddddd;
      background: #f7f7f7;
      flex-shrink: 0;
    }

    .navButton {
      width: 36px;
      height: 32px;
      border: 1px solid #cccccc;
      border-radius: 6px;
      background: #ffffff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .navButton:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #fileCounter {
      min-width: 90px;
      text-align: center;
      font-size: 14px;
      color: #333333;
    }

    #openOriginal {
      margin-left: 8px;
      font-size: 13px;
      text-decoration: none;
      color: #0066cc;
      white-space: nowrap;
    }

    #viewerFrame {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: 0;
    }

    #errorMessage {
      display: none;
      padding: 16px;
      color: #b00020;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <button
      id="prevButton"
      class="navButton"
      type="button"
      aria-label="Previous attachment"
    >
      &lt;
    </button>

    <div id="fileCounter">
      Quote 1 of 1
    </div>

    <button
      id="nextButton"
      class="navButton"
      type="button"
      aria-label="Next attachment"
    >
      &gt;
    </button>

    <a
      id="openOriginal"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
    >
      Open original
    </a>
  </div>

  <iframe
    id="viewerFrame"
    allow="autoplay"
    allowfullscreen
    title="Google attachment preview"
  ></iframe>

  <div id="errorMessage"></div>

  <script>
    let files = [];
    let currentIndex = 0;

    const supportedImageExtensions = new Set([
      "png",
      "jpg",
      "jpeg",
      "gif",
      "webp",
      "bmp",
      "heic",
      "heif",
      "tif",
      "tiff"
    ]);

    function getQueryParam(param) {
      const params = new URLSearchParams(window.location.search);
      return params.get(param);
    }

    function hasUsableValue(value) {
      if (value === null || value === undefined) {
        return false;
      }

      const normalized = String(value).trim().toLowerCase();

      return (
        normalized !== "" &&
        normalized !== "null" &&
        normalized !== "undefined"
      );
    }

    function showError(message) {
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("viewerFrame").style.display = "none";

      const errorDiv = document.getElementById("errorMessage");

      errorDiv.style.display = "block";
      errorDiv.innerText = message;
    }

    function cleanFileId(id) {
      return String(id || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function cleanFileName(name) {
      return String(name || "")
        .trim()
        .replace(/[<>]/g, "");
    }

    function cleanMimeType(mimeType) {
      return String(mimeType || "")
        .trim()
        .toLowerCase()
        .split(";")[0];
    }

    function getExtension(fileName) {
      const normalizedName = String(fileName || "")
        .trim()
        .toLowerCase();

      const lastDotIndex = normalizedName.lastIndexOf(".");

      if (lastDotIndex === -1) {
        return "";
      }

      return normalizedName.slice(lastDotIndex + 1);
    }

    function getFileType(file) {
      const mimeType = cleanMimeType(file.mimeType);
      const extension = getExtension(file.name);

      /*
       * Prefer MIME type because it is more reliable than the
       * filename extension.
       */
      if (mimeType === "application/pdf") {
        return "pdf";
      }

      if (mimeType.startsWith("image/")) {
        return "image";
      }

      /*
       * Fall back to the filename extension when MIME type is
       * missing or unavailable.
       */
      if (extension === "pdf") {
        return "pdf";
      }

      if (supportedImageExtensions.has(extension)) {
        return "image";
      }

      return "unsupported";
    }

    function getSortRank(fileType) {
      if (fileType === "pdf") {
        return 1;
      }

      if (fileType === "image") {
        return 2;
      }

      return 99;
    }

    function getPreviewUrl(fileId) {
      return (
        "https://drive.google.com/file/d/" +
        encodeURIComponent(fileId) +
        "/preview"
      );
    }

    function getOriginalUrl(fileId) {
      return (
        "https://drive.google.com/file/d/" +
        encodeURIComponent(fileId) +
        "/view"
      );
    }

    /*
     * Expected new JSON format:
     *
     * [
     *   {
     *     "id": "GOOGLE_FILE_ID",
     *     "name": "quote.pdf",
     *     "mimeType": "application/pdf"
     *   }
     * ]
     *
     * Status values:
     * - missing: files parameter is blank or absent
     * - valid: valid JSON array was received
     * - invalid: files parameter exists but cannot be parsed
     */
    function parseJsonFiles(value) {
      if (!hasUsableValue(value)) {
        return {
          status: "missing",
          items: []
        };
      }

      try {
        let parsed = JSON.parse(value);

        /*
         * Handles JSON that was accidentally stringified twice.
         */
        if (typeof parsed === "string") {
          parsed = JSON.parse(parsed);
        }

        if (!Array.isArray(parsed)) {
          return {
            status: "invalid",
            items: []
          };
        }

        return {
          status: "valid",
          items: parsed
        };
      } catch (firstError) {
        /*
         * URLSearchParams normally decodes the value once.
         * This fallback handles accidentally double-encoded JSON.
         */
        try {
          const decodedValue = decodeURIComponent(value);
          let parsed = JSON.parse(decodedValue);

          if (typeof parsed === "string") {
            parsed = JSON.parse(parsed);
          }

          if (!Array.isArray(parsed)) {
            return {
              status: "invalid",
              items: []
            };
          }

          return {
            status: "valid",
            items: parsed
          };
        } catch (secondError) {
          console.error(
            "Unable to parse attachments JSON:",
            secondError
          );

          return {
            status: "invalid",
            items: []
          };
        }
      }
    }

    /*
     * New rows:
     *
     * 1. Require a valid Google file ID.
     * 2. Require a non-empty filename.
     * 3. Keep only PDFs and images.
     * 4. Sort PDFs first and images second.
     * 5. Preserve original order within each file type.
     */
    function normalizeAndSortTypedFiles(incomingFiles) {
      return incomingFiles
        .map(function (file, index) {
          const normalizedFile = {
            id: cleanFileId(file && file.id),

            name: cleanFileName(
              file && (
                file.name ||
                file.fileName
              )
            ),

            mimeType: cleanMimeType(
              file && (
                file.mimeType ||
                file.contentType
              )
            ),

            originalIndex: index
          };

          normalizedFile.fileType =
            getFileType(normalizedFile);

          return normalizedFile;
        })

        /*
         * This filter ensures attachments without names are not
         * displayed.
         */
        .filter(function (file) {
          return (
            file.id &&
            file.name &&
            (
              file.fileType === "pdf" ||
              file.fileType === "image"
            )
          );
        })

        .sort(function (a, b) {
          const typeDifference =
            getSortRank(a.fileType) -
            getSortRank(b.fileType);

          if (typeDifference !== 0) {
            return typeDifference;
          }

          return a.originalIndex - b.originalIndex;
        });
    }

    /*
     * Previous rows:
     *
     * Old rows contain only comma-separated Google IDs.
     * Since filenames and MIME types are unavailable, the viewer
     * cannot determine which legacy attachments have missing names
     * or unsupported file types.
     *
     * This retains the previous behavior where the final ID is
     * displayed first.
     */
    function createFilesFromLegacyIdsOnly(idsValue) {
      if (!hasUsableValue(idsValue)) {
        return [];
      }

      return idsValue
        .split(",")
        .map(cleanFileId)
        .filter(Boolean)
        .reverse()
        .map(function (id, index) {
          return {
            id: id,
            name: "Attachment " + (index + 1),
            mimeType: "",
            fileType: "legacy",
            originalIndex: index
          };
        });
    }

    function updateControls() {
      const file = files[currentIndex];

      document.getElementById("fileCounter").innerText =
        "Quote " +
        (currentIndex + 1) +
        " of " +
        files.length;

      document.getElementById("prevButton").disabled =
        currentIndex === 0;

      document.getElementById("nextButton").disabled =
        currentIndex === files.length - 1;

      if (files.length <= 1) {
        document.getElementById("prevButton").style.display =
          "none";

        document.getElementById("nextButton").style.display =
          "none";
      } else {
        document.getElementById("prevButton").style.display =
          "";

        document.getElementById("nextButton").style.display =
          "";
      }

      document.getElementById("viewerFrame").title =
        file.name ||
        "Attachment " + (currentIndex + 1);
    }

    function loadCurrentFile() {
      const file = files[currentIndex];

      if (!file) {
        showError(
          "The selected attachment could not be found."
        );

        return;
      }

      document.getElementById("viewerFrame").src =
        getPreviewUrl(file.id);

      document.getElementById("openOriginal").href =
        getOriginalUrl(file.id);

      updateControls();
    }

    document
      .getElementById("prevButton")
      .addEventListener("click", function () {
        if (currentIndex > 0) {
          currentIndex--;
          loadCurrentFile();
        }
      });

    document
      .getElementById("nextButton")
      .addEventListener("click", function () {
        if (currentIndex < files.length - 1) {
          currentIndex++;
          loadCurrentFile();
        }
      });

    const filesParam = getQueryParam("files");
    const idsParam = getQueryParam("ids");

    const jsonResult = parseJsonFiles(filesParam);

    /*
     * New rows:
     *
     * When valid JSON exists, use only the JSON data.
     *
     * Do not fall back to IDs when valid JSON contains no viewable
     * files. Falling back would cause unnamed or unsupported
     * attachments to appear again.
     */
    if (jsonResult.status === "valid") {
      files = normalizeAndSortTypedFiles(
        jsonResult.items
      );

      if (!files.length) {
        showError(
          "No named PDF or image attachments were found."
        );
      } else {
        loadCurrentFile();
      }
    }

    /*
     * Previous rows or malformed new data:
     *
     * If JSON is missing or invalid, use the previous IDs-only
     * column when it is available.
     */
    else if (hasUsableValue(idsParam)) {
      files = createFilesFromLegacyIdsOnly(
        idsParam
      );

      if (!files.length) {
        showError(
          "No valid Google file IDs were found."
        );
      } else {
        loadCurrentFile();
      }
    }

    /*
     * Neither format contains usable attachment data.
     */
    else {
      showError(
        "No viewable attachments were found."
      );
    }
  </script>
</body>
</html>
